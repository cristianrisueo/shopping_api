run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam

linters-settings:
  gosec:
    severity: medium
    confidence: medium
  revive:
    severity: warning
    rules:
      - name: exported
      - name: var-naming
      - name: indent-error-flow
      - name: errorf
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/cristianrisueo/shopping-api

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
